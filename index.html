<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Luis Borges - The Mirror Man</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 selection:bg-blue-500/30 overflow-hidden">
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 45 minutes, 38 seconds in seconds (Adjusted to end exactly after the new pop-up)
        const MAX_ALLOWED_TIME = 2738; 
        const VIDEO_ID = 'yCKgf6liXvQ';

        // 20 Questions strictly synchronized to the Borges transcript + 3 seconds total delay
        const QUIZ_QUESTIONS = [
            { id: 1, timestamp: 50, text: "At what age was Jorge Luis Borges already destined to be a writer?", options: ["Nine", "Fifteen", "Twenty-one", "Thirty"], correctIndex: 0 },
            { id: 2, timestamp: 85, text: "When did international fame finally reach Borges?", options: ["In his twenties", "In his sixties when he was already blind", "After his death", "During World War I"], correctIndex: 1 },
            { id: 3, timestamp: 145, text: "Which major literary award always escaped Borges despite winning 46 others?", options: ["The Pulitzer Prize", "The Cervantes Prize", "The Nobel Prize for Literature", "The Formentor Prize"], correctIndex: 2 },
            { id: 4, timestamp: 186, text: "In what city was Jorge Luis Borges born?", options: ["Madrid", "Geneva", "Buenos Aires", "Lima"], correctIndex: 2 },
            { id: 5, timestamp: 210, text: "Where did Borges discover his endless love and pleasure for books?", options: ["In his school's library", "In his father's library", "At the National Library", "In a local bookstore"], correctIndex: 1 },
            { id: 6, timestamp: 252, text: "What was the profession of Borges' father?", options: ["A lawyer who dreamed of being a writer", "A professional poet", "A politician", "A famous architect"], correctIndex: 0 },
            { id: 7, timestamp: 362, text: "What did the young Borges fear more than anything else in his house?", options: ["The dark basement", "Spiders", "Mirrors and reflections", "Loud noises"], correctIndex: 2 },
            { id: 8, timestamp: 423, text: "Which animal at the zoo fascinated Borges and symbolized an adventurous life?", options: ["The Lion", "The Elephant", "The Tiger", "The Bear"], correctIndex: 2 },
            { id: 9, timestamp: 565, text: "Why did the Borges family move to Geneva, Switzerland?", options: ["To escape a war in Argentina", "To consult a specialist for his father's failing eyesight", "To find a publisher for Borges' book", "To start a new business"], correctIndex: 1 },
            { id: 10, timestamp: 587, text: "What major global event kept the Borges family in Europe longer than expected?", options: ["The Spanish Civil War", "World War I", "World War II", "The Great Depression"], correctIndex: 1 },
            { id: 11, timestamp: 663, text: "What was the title of Borges' first book of poems, inspired by his return to his hometown?", options: ["Ficciones", "The Aleph", "Fervor de Buenos Aires", "Labyrinths"], correctIndex: 2 },
            { id: 12, timestamp: 980, text: "According to Borges, how does a real peasant or gaucho view the landscape?", options: ["For its aesthetic beauty", "As a place of spiritual reflection", "For its practicalities, like checking the weather", "As something to be conquered"], correctIndex: 2 },
            { id: 13, timestamp: 1175, text: "What literary movement did Borges embrace in Spain that believed the metaphor was the essence of poetry?", options: ["Surrealism", "Ultraism", "Romanticism", "Realism"], correctIndex: 1 },
            { id: 14, timestamp: 1205, text: "Who was the young writer Borges famously collaborated with under the pseudonym Bustos Domecq?", options: ["Gabriel García Márquez", "Julio Cortázar", "Adolfo Bioy Casares", "Victoria Ocampo"], correctIndex: 2 },
            { id: 15, timestamp: 1507, text: "Where did Borges work to financially support his family after his father's death?", options: ["At a university as a professor", "At a small municipal library", "At a local newspaper", "At a law firm"], correctIndex: 1 },
            { id: 16, timestamp: 1561, text: "What near-fatal accident did Borges suffer in 1938?", options: ["He was in a train crash", "He hit his head on an open, freshly painted window", "He fell off a horse", "He was caught in a street fight"], correctIndex: 1 },
            { id: 17, timestamp: 1628, text: "What famous short story did Borges write to test if he had lost his mental abilities after his head injury?", options: ["The South", "The Library of Babel", "Pierre Menard, Author of Don Quixote", "The Circular Ruins"], correctIndex: 2 },
            { id: 18, timestamp: 2136, text: "What prestigious position was Borges appointed to in 1955 after the fall of Perón?", options: ["Minister of Culture", "Director of the National Library", "President of the University", "Ambassador to Spain"], correctIndex: 1 },
            { id: 19, timestamp: 2157, text: "What ironic fate did Borges share with two previous directors of the National Library?", options: ["They were all exiled", "They all went blind", "They all wrote the same book", "They were all from Geneva"], correctIndex: 1 },
            { id: 20, timestamp: 2657, text: "In which city did Borges choose to spend his final days and die?", options: ["Buenos Aires", "Madrid", "Paris", "Geneva"], correctIndex: 3 },
            // Final pop-up at exactly 45:37 (2737 seconds)
            { id: 21, timestamp: 2737, text: "Video ended. Get my scores to save", options: ["Save my scores and exit"], correctIndex: 0 }
        ];

        // Salt for Local Storage obfuscation
        const SALT = "borges_v2_";

        const getSavedNum = (key) => {
            try {
                const saved = localStorage.getItem(key);
                if (saved) return parseFloat(atob(saved).replace(SALT, '')) || 0;
            } catch(e) {}
            return 0;
        };
        
        const getSavedStr = (key) => {
            try {
                const saved = localStorage.getItem(key);
                if (saved) return atob(saved).replace(SALT, '');
            } catch(e) {}
            return "";
        };

        const getSavedAnswers = () => {
            try {
                const saved = localStorage.getItem('borges_video_answers_hash');
                if (saved) return JSON.parse(atob(saved).replace(SALT, ''));
            } catch(e) {}
            return {};
        };

        const TEACHER_PIN = "1234";

        const App = () => {
            const [view, setView] = useState('instructions'); 
            
            const [player, setPlayer] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(() => getSavedNum('borges_video_curr_time_hash'));
            const [ccEnabled, setCcEnabled] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [isFullscreen, setIsFullscreen] = useState(false);
            
            const [maxTimeWatched, setMaxTimeWatched] = useState(() => getSavedNum('borges_video_max_time_hash'));
            const maxTimeWatchedRef = useRef(getSavedNum('borges_video_max_time_hash'));
            
            // Student Information States
            const [firstName, setFirstName] = useState(() => getSavedStr('borges_video_first_name'));
            const [lastName, setLastName] = useState(() => getSavedStr('borges_video_last_name'));
            const [period, setPeriod] = useState(() => getSavedStr('borges_video_period'));
            const [email, setEmail] = useState(() => getSavedStr('borges_video_email'));

            const firstNameRef = useRef(firstName);
            const lastNameRef = useRef(lastName);
            const periodRef = useRef(period);
            const emailRef = useRef(email);

            const playbackRateRef = useRef(1);

            // Question Tracking Logic
            const [activeQuestion, setActiveQuestion] = useState(null);
            const activeQuestionRef = useRef(null);
            const lastTriggeredQuestionIdRef = useRef(null); 

            // Student Answers Object: { 1: true, 2: false }
            const [studentAnswers, setStudentAnswers] = useState(getSavedAnswers());

            // Modal Interactions
            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            
            const selectedOptionRef = useRef(null);
            const showFeedbackRef = useRef(false);

            // Teacher Mode States
            const [isTeacherMode, setIsTeacherMode] = useState(false);
            const isTeacherModeRef = useRef(false);
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState("");
            const [pinError, setPinError] = useState(false);

            const playerContainerRef = useRef(null);
            const intervalRef = useRef(null);
            const videoWrapperRef = useRef(null);

            // Fullscreen Event Listeners
            useEffect(() => {
                const handleFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement || !!document.webkitFullscreenElement);
                };
                
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
                return () => {
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                    document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
                };
            }, []);

            // Keyboard navigation for Skip/Continue
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (activeQuestionRef.current && e.key === 'Enter') {
                        e.preventDefault(); 
                        e.stopPropagation(); 
                        if (showFeedbackRef.current) {
                            handleContinueVideo();
                        } else {
                            handleSkip();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown, true);
                return () => window.removeEventListener('keydown', handleKeyDown, true);
            }, []);

            // Browser 'Confirm Exit' Dialog
            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (view === 'video' && !isTeacherModeRef.current) {
                        e.preventDefault();
                        e.returnValue = ''; 
                    }
                };
                window.addEventListener("beforeunload", handleBeforeUnload);
                return () => window.removeEventListener("beforeunload", handleBeforeUnload);
            }, [view]);

            // Tab Visibility Detection (Pauses video but removes penalization)
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden && view === 'video' && !isTeacherModeRef.current) {
                        if (player && typeof player.pauseVideo === 'function') {
                            player.pauseVideo();
                        }
                    }
                };

                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, [view, player, isFullscreen]);

            // Load YouTube Iframe API
            useEffect(() => {
                if (view !== 'video') return;

                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    
                    window.onYouTubeIframeAPIReady = initializePlayer;
                } else if (!player) {
                    initializePlayer();
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [view]);

            const initializePlayer = () => {
                const startTime = Math.floor(getSavedNum('borges_video_curr_time_hash'));
                const newPlayer = new window.YT.Player(playerContainerRef.current, {
                    videoId: VIDEO_ID,
                    playerVars: {
                        controls: 0,       
                        disablekb: 1,      
                        rel: 0,            
                        modestbranding: 1, 
                        fs: 0,             // Disables native youtube fullscreen
                        iv_load_policy: 3, 
                        start: startTime,  
                        cc_load_policy: 1,
                        playsinline: 1     
                    },
                    events: {
                        onReady: (event) => {
                            setPlayer(event.target);
                            event.target.setOption('captions', 'track', {}); 
                            
                            if (startTime > 0) {
                                event.target.seekTo(startTime, true);
                            }
                        },
                        onStateChange: (event) => {
                            setIsPlaying(event.data === window.YT.PlayerState.PLAYING);
                        }
                    }
                });
            };

            // Main Video Loop
            useEffect(() => {
                if (isPlaying && player && view === 'video') {
                    intervalRef.current = setInterval(() => {
                        const time = player.getCurrentTime();
                        
                        if (time >= MAX_ALLOWED_TIME) {
                            player.pauseVideo();
                            if (document.fullscreenElement) document.exitFullscreen();
                            setView('finished');
                            return;
                        }
                        
                        // Fast Forward Allowed - Track max time without restrictions
                        if (time > maxTimeWatchedRef.current) {
                            maxTimeWatchedRef.current = time;
                            setMaxTimeWatched(time);
                            localStorage.setItem('borges_video_max_time_hash', btoa(SALT + time.toString())); 
                        }

                        if (time > 0 || maxTimeWatchedRef.current === 0) {
                            setCurrentTime(time);
                            localStorage.setItem('borges_video_curr_time_hash', btoa(SALT + time.toString())); 
                        }

                        // === Dynamic Rewind & Question Triggering ===
                        if (!activeQuestionRef.current) {
                            // Find any question that belongs to the current exact 1-second timestamp
                            const upcoming = QUIZ_QUESTIONS.find(q => 
                                time >= q.timestamp && time < q.timestamp + 1
                            );
                            
                            if (upcoming && lastTriggeredQuestionIdRef.current !== upcoming.id) {
                                player.pauseVideo();
                                setActiveQuestion(upcoming);
                                activeQuestionRef.current = upcoming;
                                lastTriggeredQuestionIdRef.current = upcoming.id;
                            } else if (!upcoming) {
                                lastTriggeredQuestionIdRef.current = null;
                            }
                        }

                    }, 250);
                } else {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [isPlaying, player, view]);

            const togglePlayPause = () => {
                if (!player) return;
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            };

            const toggleCC = () => {
                if (!player) return;
                if (ccEnabled) {
                    player.setOption('captions', 'track', {}); 
                    setCcEnabled(false);
                } else {
                    player.setOption('captions', 'track', {languageCode: 'en'}); 
                    setCcEnabled(true);
                }
            };

            const toggleSpeed = () => {
                if (!player) return;
                const newRate = playbackRate === 1 ? 1.25 : 1;
                setPlaybackRate(newRate);
                playbackRateRef.current = newRate;
                player.setPlaybackRate(newRate);
            };

            const handleRewind = () => {
                if (!player) return;
                const newTime = Math.max(0, player.getCurrentTime() - 10);
                player.seekTo(newTime, true);
                setCurrentTime(newTime);
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    if (videoWrapperRef.current.requestFullscreen) {
                        videoWrapperRef.current.requestFullscreen();
                    } else if (videoWrapperRef.current.webkitRequestFullscreen) {
                        videoWrapperRef.current.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            };

            const handleTimelineClick = (e) => {
                if (!player) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const clickRatio = (e.clientX - rect.left) / rect.width;
                let targetTime = clickRatio * MAX_ALLOWED_TIME;

                // Completely open timeline clicking (Fast Forward Allowed)
                if (targetTime > maxTimeWatchedRef.current) {
                    maxTimeWatchedRef.current = targetTime;
                    setMaxTimeWatched(targetTime);
                    localStorage.setItem('borges_video_max_time_hash', btoa(SALT + targetTime.toString()));
                }
                 
                player.seekTo(targetTime, true);
                setCurrentTime(targetTime);
            };

            const handleOptionClick = (index) => {
                if (showFeedbackRef.current) return; 
                setSelectedOption(index);
                selectedOptionRef.current = index;
                setShowFeedback(true);
                showFeedbackRef.current = true;
            };

            const handleSkip = () => {
                const questionId = activeQuestionRef.current?.id;
                if (!questionId) return;

                setStudentAnswers(prev => {
                    const next = { ...prev, [questionId]: false };
                    try {
                        localStorage.setItem('borges_video_answers_hash', btoa(SALT + JSON.stringify(next)));
                    } catch(err) {}
                    return next;
                });
                
                // If it's the final end-of-video pop-up, skip straight to finished view
                if (questionId === 21) {
                    if (document.fullscreenElement) document.exitFullscreen();
                    setView('finished');
                    return;
                }
                
                resetModalState();
            };

            const handleContinueVideo = () => {
                const currentQ = activeQuestionRef.current;
                if (!currentQ) return;

                const questionId = currentQ.id;
                const correctIndex = currentQ.correctIndex;
                const selectedOpt = selectedOptionRef.current;

                setStudentAnswers(prev => {
                    const isCorrect = selectedOpt === correctIndex;
                    const next = { ...prev, [questionId]: isCorrect };
                    try {
                        localStorage.setItem('borges_video_answers_hash', btoa(SALT + JSON.stringify(next)));
                    } catch(err) {}
                    return next;
                });
                
                // If it's the final end-of-video pop-up, drop straight into finished view
                if (questionId === 21) {
                    if (document.fullscreenElement) document.exitFullscreen();
                    setView('finished');
                    return;
                }
                
                resetModalState();
            };

            const resetModalState = () => {
                setActiveQuestion(null);
                activeQuestionRef.current = null;
                setSelectedOption(null);
                selectedOptionRef.current = null;
                setShowFeedback(false);
                showFeedbackRef.current = false;
                
                if (player && typeof player.playVideo === 'function') {
                    player.playVideo();
                }
            };

            // Input Handlers
            const handleFirstNameChange = (e) => {
                setFirstName(e.target.value);
                firstNameRef.current = e.target.value;
                localStorage.setItem('borges_video_first_name', btoa(SALT + e.target.value));
            };
            const handleLastNameChange = (e) => {
                setLastName(e.target.value);
                lastNameRef.current = e.target.value;
                localStorage.setItem('borges_video_last_name', btoa(SALT + e.target.value));
            };
            const handlePeriodChange = (e) => {
                setPeriod(e.target.value);
                periodRef.current = e.target.value;
                localStorage.setItem('borges_video_period', btoa(SALT + e.target.value));
            };
            const handleEmailChange = (e) => {
                setEmail(e.target.value);
                emailRef.current = e.target.value;
                localStorage.setItem('borges_video_email', btoa(SALT + e.target.value));
            };

            const isFormValid = firstName.trim() && lastName.trim() && period && email.trim();

            const calculateScore = () => {
                // Ensure we don't count the "Video Ended" popup in the 20-question score
                return Object.entries(studentAnswers).filter(([id, val]) => val === true && id !== '21').length;
            };

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = Math.floor(seconds % 60).toString().padStart(2, '0');
                return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            };

            const maxWatchedStyle = { width: `${(maxTimeWatched / MAX_ALLOWED_TIME) * 100 || 0}%` };
            const currentTimeStyle = { width: `${(currentTime / MAX_ALLOWED_TIME) * 100 || 0}%` };

            const downloadCSV = () => {
                const finalScore = calculateScore();
                
                const rows = [
                    ["Field", "Value"],
                    ["Assignment", "Jorge Luis Borges - The Mirror Man"],
                    ["First Name", firstNameRef.current],
                    ["Last Name", lastNameRef.current],
                    ["Period", periodRef.current],
                    ["Email", emailRef.current],
                    ["Date Completed", new Date().toLocaleString()],
                    ["Final Score", `${finalScore} / 20`],
                    ["Max Time Watched (seconds)", Math.floor(maxTimeWatchedRef.current)],
                    ["Cheating Alert (Tab Violations)", violations]
                ];
                
                const csvContent = rows.map(r => r.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                
                const safeName = `${firstNameRef.current}_${lastNameRef.current}`.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'student';
                link.setAttribute("href", url);
                link.setAttribute("download", `${safeName}_borges_results.csv`);
                link.style.visibility = 'hidden';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            useEffect(() => {
                if (view === 'finished') {
                    downloadCSV();
                }
            }, [view]);

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === TEACHER_PIN) {
                    setIsTeacherMode(true);
                    isTeacherModeRef.current = true;
                    setShowPinModal(false);
                    setPinInput("");
                    setPinError(false);
                } else {
                    setPinError(true);
                    setPinInput("");
                }
            };

            const disableTeacherMode = () => {
                setIsTeacherMode(false);
                isTeacherModeRef.current = false;
            };

            if (view === 'instructions') {
                return (
                    <div className="max-w-2xl w-full bg-slate-800 p-6 sm:p-10 rounded-2xl shadow-2xl border border-slate-700 relative max-h-[90vh] overflow-y-auto">
                        {!isTeacherMode ? (
                            <button 
                                onClick={() => setShowPinModal(true)}
                                className="absolute top-4 right-4 text-slate-700 hover:text-slate-400 transition-colors"
                                title="Teacher Access"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </button>
                        ) : (
                            <button 
                                onClick={disableTeacherMode}
                                className="absolute top-4 right-4 text-green-500 hover:text-green-400 transition-colors text-sm font-bold flex items-center gap-1 bg-green-900/20 px-3 py-1 rounded-full border border-green-500/30"
                                title="Return to Student Mode"
                            >
                                🔓 Exit Teacher Mode
                            </button>
                        )}

                        <h1 className="text-3xl sm:text-4xl font-black text-white mb-6 border-b border-slate-700 pb-4 sm:pb-6 uppercase tracking-wider text-center">
                            Jorge Luis Borges<br/>
                            <span className="text-xl sm:text-2xl text-blue-400 block mt-2">The Mirror Man</span>
                        </h1>
                        
                        <div className="space-y-4 sm:space-y-6 text-base sm:text-lg leading-relaxed text-slate-200 font-medium">
                            <p>
                                Watch until the end.
                            </p>
                            <p className="text-red-400 font-bold bg-red-900/20 p-4 rounded-xl border border-red-500/30 text-base">
                                At the end of the video, your final score window will appear, and you will download a CSV file. You must submit this downloaded file to your teacher!
                            </p>
                        </div>
                        
                        <div className="bg-slate-700/40 p-5 sm:p-6 rounded-xl border border-slate-600 mt-8 sm:mt-10 grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-300 mb-1">First Name: <span className="text-red-400">*</span></label>
                                <input 
                                    type="text" 
                                    value={firstName}
                                    onChange={handleFirstNameChange}
                                    placeholder="First Name"
                                    className="w-full bg-slate-900 text-white px-3 py-2 rounded-lg border border-slate-500 focus:outline-none focus:border-blue-500 text-base"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-300 mb-1">Last Name: <span className="text-red-400">*</span></label>
                                <input 
                                    type="text" 
                                    value={lastName}
                                    onChange={handleLastNameChange}
                                    placeholder="Last Name"
                                    className="w-full bg-slate-900 text-white px-3 py-2 rounded-lg border border-slate-500 focus:outline-none focus:border-blue-500 text-base"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-300 mb-1">Period: <span className="text-red-400">*</span></label>
                                <select 
                                    value={period}
                                    onChange={handlePeriodChange}
                                    className="w-full bg-slate-900 text-white px-3 py-2 rounded-lg border border-slate-500 focus:outline-none focus:border-blue-500 text-base"
                                >
                                    <option value="" disabled>Select Period...</option>
                                    <option value="1">1</option>
                                    <option value="a2">a2</option>
                                    <option value="a4">a4</option>
                                    <option value="b2">b2</option>
                                    <option value="b4">b4</option>
                                    <option value="5th">5th</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-300 mb-1">Email: <span className="text-red-400">*</span></label>
                                <input 
                                    type="email" 
                                    value={email}
                                    onChange={handleEmailChange}
                                    placeholder="student@email.com"
                                    className="w-full bg-slate-900 text-white px-3 py-2 rounded-lg border border-slate-500 focus:outline-none focus:border-blue-500 text-base"
                                />
                            </div>
                        </div>

                        <div className="mt-6 sm:mt-8 flex justify-center pb-2">
                            <button 
                                onClick={() => setView('video')}
                                disabled={!isFormValid}
                                className={`px-8 py-4 sm:px-12 sm:py-5 rounded-xl font-black text-xl sm:text-2xl uppercase tracking-wide transition-all transform ${isFormValid ? 'bg-green-600 hover:bg-green-500 text-white shadow-[0_0_20px_rgba(22,163,74,0.4)] hover:scale-105' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`}
                            >
                                Go to the Video
                            </button>
                        </div>

                        {showPinModal && (
                            <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex items-center justify-center rounded-2xl">
                                <div className="bg-slate-800 p-8 rounded-xl border border-slate-600 shadow-2xl w-96 max-w-full relative">
                                    <button 
                                        onClick={() => { setShowPinModal(false); setPinError(false); }}
                                        className="absolute top-3 right-3 text-slate-400 hover:text-white"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                    <h2 className="text-2xl font-bold text-white mb-4 text-center">Teacher Override</h2>
                                    <form onSubmit={handlePinSubmit} className="flex flex-col gap-4">
                                        <input 
                                            type="password" 
                                            value={pinInput}
                                            onChange={(e) => setPinInput(e.target.value)}
                                            placeholder="Enter PIN" 
                                            className="w-full bg-slate-700 text-white px-4 py-3 rounded-lg border focus:outline-none text-center text-xl tracking-widest font-mono"
                                            autoFocus
                                        />
                                        {pinError && <p className="text-red-400 text-sm text-center font-bold">Incorrect PIN.</p>}
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors">
                                            Unlock Timeline
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'finished') {
                return (
                    <div className="max-w-3xl w-full bg-slate-800 p-10 rounded-2xl shadow-2xl border border-slate-700 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-green-400 mb-6"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                        <h1 className="text-4xl font-black text-white mb-2">Video Completed</h1>
                        <h2 className="text-xl text-blue-400 font-bold mb-6">{firstName} {lastName}</h2>
                        
                        <div className="bg-slate-900 border border-slate-600 rounded-xl p-8 mb-8 inline-block shadow-inner">
                            <p className="text-slate-400 text-lg uppercase tracking-widest font-bold mb-2">Final Score</p>
                            <p className="text-6xl font-black text-white">
                                <span className={calculateScore() >= 14 ? 'text-green-400' : 'text-amber-400'}>
                                    {calculateScore()}
                                </span> 
                                <span className="text-3xl text-slate-500"> / 20</span>
                            </p>
                        </div>
                        
                        <div className="bg-slate-700/50 rounded-xl p-6 mb-8 border border-slate-600">
                            <h3 className="text-xl font-bold text-blue-400 mb-2">📥 Results Downloaded Automatically</h3>
                            <p className="text-slate-300 mb-4">Your results CSV file has been downloaded. If your browser blocked it, please click the button below to download it manually.</p>
                            <button 
                                onClick={downloadCSV}
                                className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-colors shadow-lg"
                            >
                                Download Results Again
                            </button>
                        </div>

                        <p className="mt-8 text-xl text-amber-400 font-bold">
                            Please ensure your results file has downloaded and submit it to your teacher!
                        </p>
                    </div>
                );
            }

            return (
                <div className="w-full flex flex-col items-center gap-6 animate-fadeIn">
                    {!isFullscreen && (
                        <div className="text-center space-y-2">
                            <h1 className="text-3xl font-bold text-white">Jorge Luis Borges - The Mirror Man</h1>
                            {isTeacherMode && (
                                <div className="flex flex-col items-center gap-3">
                                    <p className="text-green-400 font-bold bg-green-900/30 px-4 py-1 rounded-full inline-block border border-green-500/50">
                                        🔓 TEACHER MODE ACTIVE
                                    </p>
                                    <button 
                                        onClick={disableTeacherMode}
                                        className="text-sm font-black text-white hover:bg-red-500 transition-colors bg-red-600 px-6 py-2 rounded-full border border-red-400 shadow-[0_0_15px_rgba(220,38,38,0.6)] uppercase tracking-wide"
                                    >
                                        ❌ Return to Student Mode
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Wrapper targeted for Fullscreen */}
                    <div 
                        ref={videoWrapperRef} 
                        className={`flex flex-col relative transition-all duration-300 ${isFullscreen ? 'w-screen h-screen bg-black justify-center' : 'w-full rounded-xl shadow-2xl overflow-hidden border border-slate-700'}`}
                    >
                        <div className={`relative w-full bg-black ${isFullscreen ? 'flex-grow' : 'aspect-video'}`}>
                            <div ref={playerContainerRef} className="absolute inset-0 w-full h-full"></div>
                            <div className="absolute inset-0 z-10 bg-transparent"></div>
                        </div>

                        {/* Interactive Question Modal Overlay */}
                        {activeQuestion && (
                            <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4 sm:p-8 overflow-y-auto">
                                <div className="max-w-3xl w-full bg-slate-800 rounded-2xl p-6 sm:p-8 shadow-2xl border border-slate-600 my-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl sm:text-2xl font-bold text-white leading-relaxed">
                                            {activeQuestion.text}
                                        </h2>
                                        <span className="bg-blue-600 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap ml-4">
                                            {activeQuestion.id === 21 ? 'Finished' : `Question ${activeQuestion.id} of 20`}
                                        </span>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {activeQuestion.options.map((option, idx) => {
                                            let btnStyles = "w-full text-left p-3 sm:p-4 rounded-xl border-2 transition-all duration-200 font-medium ";
                                            
                                            if (!showFeedback) {
                                                btnStyles += "border-slate-600 hover:border-blue-400 hover:bg-slate-700 bg-slate-700/50 text-slate-200";
                                            } else {
                                                if (idx === activeQuestion.correctIndex) {
                                                    btnStyles += "border-green-500 bg-green-500/20 text-green-100"; 
                                                } else if (idx === selectedOption) {
                                                    btnStyles += "border-red-500 bg-red-500/20 text-red-100"; 
                                                } else {
                                                    btnStyles += "border-slate-700 bg-slate-800 text-slate-500 opacity-50"; 
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleOptionClick(idx)}
                                                    className={btnStyles}
                                                    disabled={showFeedback}
                                                >
                                                    {activeQuestion.id !== 21 && (
                                                        <span className="inline-block w-8 font-bold opacity-70">
                                                            {String.fromCharCode(65 + idx)}.
                                                        </span>
                                                    )}
                                                    {option}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    <div className="mt-8 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 animate-fadeIn border-t border-slate-700 pt-6">
                                        {!showFeedback ? (
                                            <>
                                                <div className="text-slate-400 font-medium text-sm hidden sm:block">Press <kbd className="bg-slate-700 px-2 py-1 rounded border border-slate-600 text-white">Enter</kbd> to skip</div>
                                                <button 
                                                    onClick={handleSkip}
                                                    className="w-full sm:w-auto text-slate-300 hover:text-white px-6 py-3 rounded-lg font-bold transition-colors border border-slate-600 hover:bg-slate-700"
                                                >
                                                    Skip Question
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <div className={`text-xl font-bold ${selectedOption === activeQuestion.correctIndex ? 'text-green-400' : 'text-red-400'}`}>
                                                    {selectedOption === activeQuestion.correctIndex ? '✓ Correct!' : '✗ Incorrect.'}
                                                </div>
                                                <div className="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                                                    <span className="text-slate-400 font-medium text-sm hidden sm:block">Press <kbd className="bg-slate-700 px-2 py-1 rounded border border-slate-600 text-white">Enter</kbd> to continue</span>
                                                    <button 
                                                        onClick={handleContinueVideo}
                                                        className="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-lg font-bold shadow-lg transition-colors text-lg"
                                                    >
                                                        Continue
                                                    </button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Custom Control Bar */}
                        <div className={`w-full bg-slate-800 p-4 sm:p-5 flex flex-col gap-3 z-40 ${isFullscreen ? 'pb-8' : ''}`}>
                            {/* Timeline strictly mapped to the assigned duration */}
                            <div 
                                className="relative w-full h-3 bg-slate-700 rounded-full group cursor-pointer"
                                onClick={handleTimelineClick}
                            >
                                {/* Max Watched Buffer */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-slate-500 rounded-full opacity-50 transition-all duration-200"
                                    style={maxWatchedStyle}
                                ></div>
                                
                                {/* Current Time Progress */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-blue-500 rounded-full transition-all duration-200"
                                    style={currentTimeStyle}
                                ></div>

                                {/* Question Markers on Timeline */}
                                {MAX_ALLOWED_TIME > 0 && QUIZ_QUESTIONS.map(q => {
                                    if (q.id === 21) return null; // Hide the marker for the final end screen pop-up
                                    
                                    const markerStyle = { left: `calc(${(q.timestamp / MAX_ALLOWED_TIME) * 100}% - 2px)` };
                                    
                                    // Color logic based on answered state
                                    let dotColor = 'bg-amber-400';
                                    if (studentAnswers[q.id] === true) dotColor = 'bg-green-400 opacity-80';
                                    if (studentAnswers[q.id] === false) dotColor = 'bg-red-500 opacity-80';

                                    return (
                                        <div 
                                            key={q.id}
                                            className={`absolute top-1/2 -translate-y-1/2 w-1.5 h-3 rounded-full ${dotColor}`}
                                            style={markerStyle}
                                            title={`Question ${q.id}`}
                                        ></div>
                                    );
                                })}
                            </div>

                            {/* Controls row */}
                            <div className="flex items-center gap-3 sm:gap-5 mt-2">
                                <button 
                                    onClick={togglePlayPause}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none z-20"
                                    disabled={!!activeQuestion}
                                    title={isPlaying ? "Pause" : "Play"}
                                >
                                    {isPlaying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                    )}
                                </button>
                                
                                <button 
                                    onClick={handleRewind}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none flex items-center gap-1 z-20"
                                    disabled={!!activeQuestion}
                                    title="Rewind 10 Seconds"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    <span className="text-sm font-bold -ml-0.5 hidden sm:inline">10s</span>
                                </button>
                                
                                <button 
                                    onClick={toggleCC}
                                    className={`transition-colors focus:outline-none z-20 ${ccEnabled ? 'text-blue-400' : 'text-slate-400 hover:text-white'}`}
                                    title={ccEnabled ? "Turn Off Captions" : "Turn On Captions"}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="14" x="3" y="5" rx="2" ry="2"/><path d="M7 15h4M15 15h2M7 11h2M13 11h4"/></svg>
                                </button>

                                {/* Playback Speed Button & Teacher Override */}
                                <div className="ml-2 flex items-center gap-3 hidden md:flex">
                                    {isTeacherMode && (
                                        <button 
                                            onClick={disableTeacherMode}
                                            className="bg-red-600 hover:bg-red-500 text-white px-4 py-1.5 rounded-lg font-bold shadow-[0_0_10px_rgba(220,38,38,0.6)] transition-colors flex items-center gap-2 border border-red-400 animate-pulse whitespace-nowrap z-20"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                            EXIT TEACHER
                                        </button>
                                    )}

                                    {!isTeacherMode && (
                                        <>
                                            <span className="text-2xl">😊</span>
                                            <span className="text-sm font-bold text-amber-400 uppercase tracking-wide">ok, you can speed up to 1.25x</span>
                                            
                                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-red-500 animate-pulse drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]">
                                                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                                            </svg>
                                        </>
                                    )}
                                    
                                    <button 
                                        onClick={toggleSpeed}
                                        disabled={!!activeQuestion}
                                        className={`z-20 px-4 py-1.5 rounded-lg border-2 font-bold transition-all focus:outline-none disabled:opacity-50 ${playbackRate === 1.25 ? 'bg-amber-500/20 border-amber-400 text-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.3)]' : 'border-slate-500 text-white hover:border-white shadow-[0_0_10px_rgba(255,255,255,0.2)]'}`}
                                        title="Toggle Speed"
                                    >
                                        {playbackRate}x
                                    </button>
                                </div>

                                {/* Fullscreen Button */}
                                <button 
                                    onClick={toggleFullscreen}
                                    className="text-slate-400 hover:text-white transition-colors focus:outline-none z-20 sm:ml-4 ml-auto"
                                    title={isFullscreen ? "Exit Fullscreen" : "Fullscreen"}
                                >
                                    {isFullscreen ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                                    )}
                                </button>

                                <div className="text-base font-medium text-slate-300 font-mono hidden sm:flex items-center gap-4 ml-auto">
                                    <div className="flex gap-3 text-sm">
                                        <span className="text-white font-bold tracking-wide">Score: <span className="text-green-400">{calculateScore()}</span> / 20</span>
                                    </div>
                                    <span className="opacity-50 mx-2">|</span>
                                    {formatTime(currentTime)} / {formatTime(MAX_ALLOWED_TIME)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
