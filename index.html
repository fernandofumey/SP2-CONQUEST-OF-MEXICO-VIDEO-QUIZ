<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive History Quiz - Hernán Cortés</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 30 Questions perfectly synchronized to appear right after the information is spoken
        const QUIZ_QUESTIONS = [
            { id: 1, timestamp: 26, text: "What served as the highways of commerce for the Aztec Empire?", options: ["Dirt roads", "Waterways between artificial islands", "Mountain passes", "Stone bridges"], correctIndex: 1 },
            { id: 2, timestamp: 130, text: "What omen had the Aztecs seen in the sky in 1518 predicting a time of great trouble?", options: ["A solar eclipse", "A comet", "A meteor shower", "A red moon"], correctIndex: 1 },
            { id: 3, timestamp: 160, text: "Where was the Aztec capital city of Tenochtitlan built?", options: ["In a dense jungle", "On top of a mountain peak", "On an island in the middle of a lake", "Along the coastline"], correctIndex: 2 },
            { id: 4, timestamp: 215, text: "Who was selected by the Deputy Governor of Cuba to lead the expedition to the West?", options: ["Christopher Columbus", "Francisco Pizarro", "Hernán Cortés", "Panfilo de Narvaez"], correctIndex: 2 },
            { id: 5, timestamp: 238, text: "What did Hernán Cortés study before becoming an adventurer?", options: ["Medicine", "Law", "Theology", "Engineering"], correctIndex: 1 },
            { id: 6, timestamp: 330, text: "Which of these was NOT one of the main career paths for a young Spanish man without inherited land?", options: ["The Church (Priest)", "The Sea (Sailor)", "Royal Service", "Farming"], correctIndex: 3 },
            { id: 7, timestamp: 374, text: "What major military advantages did the Spanish possess compared to the natives?", options: ["Gunpowder and steel", "Poison arrows and stealth", "War elephants", "Advanced naval mines"], correctIndex: 0 },
            { id: 8, timestamp: 418, text: "Why did the Spanish mostly abandon their heavy steel armor?", options: ["It rusted quickly in the jungle environment", "They traded it for native gold", "Lightweight native cotton armor was sufficient against Aztec weapons", "It was too heavy to carry through the mountains"], correctIndex: 2 },
            { id: 9, timestamp: 475, text: "Who was the enslaved woman who became an invaluable translator for Cortés?", options: ["Isabella", "Marina (La Malinche)", "Maria", "Catalina"], correctIndex: 1 },
            { id: 10, timestamp: 562, text: "How did Cortés play a double game with the Aztec tax collectors?", options: ["He killed them all immediately", "He convinced a local chief to imprison them, then secretly freed them to look like a friend to Moctezuma", "He paid them off with Spanish gold", "He sent them back with a declaration of war"], correctIndex: 1 },
            { id: 11, timestamp: 648, text: "How did Moctezuma initially react to the Spanish threat?", options: ["He immediately launched a massive attack", "He ignored them completely", "He sent messengers with presents to welcome them", "He fled the capital city"], correctIndex: 2 },
            { id: 12, timestamp: 692, text: "In the Aztec cultural system, what did it mean when the Spanish accepted Moctezuma's gifts and gave gifts in return?", options: ["It meant the Spanish recognized Moctezuma's sovereignty and would not wage war", "It was a formal declaration of war", "It meant the Spanish were surrendering", "It was a demand for more tribute"], correctIndex: 0 },
            { id: 13, timestamp: 752, text: "What dramatic action did Cortés take to ensure his men could not retreat or return to Cuba?", options: ["He burned all their extra armor", "He ran all his ships aground and broke them up", "He executed half his crew as a warning", "He gave all their money to the local tribes"], correctIndex: 1 },
            { id: 14, timestamp: 890, text: "How did the Aztecs primarily seek glory in warfare?", options: ["By dying a glorious death on the battlefield", "By killing as many enemies as possible from afar", "By capturing the enemy alive for sacrifice to their gods", "By destroying enemy cities completely"], correctIndex: 2 },
            { id: 15, timestamp: 948, text: "Why was Moctezuma unable to effectively deal with the Spaniards?", options: ["He had no army", "The Spanish didn't fit into his cultural paradigms or react normally to his strategies", "He was asleep the entire time", "His advisors betrayed him early on"], correctIndex: 1 },
            { id: 16, timestamp: 1058, text: "What was the design purpose of Mesoamerican weapons like the obsidian sword?", options: ["To pierce heavy steel armor", "To kill instantly on the battlefield", "To disable and wound enemies so they could be captured", "To be thrown from extremely long distances"], correctIndex: 2 },
            { id: 17, timestamp: 1178, text: "What happened after the brutal initial battles between the Spanish and the Tlaxcalans?", options: ["The Tlaxcalans wiped out the Spanish completely", "The Tlaxcalans fled to the mountains permanently", "The Tlaxcalans were cowed into joining forces with Cortés as allies", "The Spanish retreated to the coast in defeat"], correctIndex: 2 },
            { id: 18, timestamp: 1215, text: "What did Aztec priests and leaders consume to assist in receiving religious visions?", options: ["Alcohol", "Hallucinogenic mushrooms", "Tobacco", "Special teas"], correctIndex: 1 },
            { id: 19, timestamp: 1318, text: "Which animals did the Spanish bring that severely terrified the Mesoamericans?", options: ["Elephants and tigers", "Horses and large mastiff dogs", "Camels and falcons", "Bulls and wildcats"], correctIndex: 1 },
            { id: 20, timestamp: 1458, text: "What audacious action did Cortés take while staying in Tenochtitlan?", options: ["He burned the grand palace down", "He kidnapped Moctezuma and made him a hostage", "He stole the crown jewels and fled in the night", "He assassinated the high priest in front of everyone"], correctIndex: 1 },
            { id: 21, timestamp: 1618, text: "Why did Cortés temporarily leave the capital and return to the coast?", options: ["To gather more gold", "To defeat a Spanish force sent by the Cuban governor to overthrow him", "To escape a sudden plague", "To build new ships"], correctIndex: 1 },
            { id: 22, timestamp: 1708, text: "What atrocity did Cortés's deputy, Alvarado, commit during a major Aztec religious festival?", options: ["He joined the dances and mocked their gods", "He ordered the massacre of the unarmed Aztec noblemen and dancers", "He stole the sacrificial offerings", "He surrendered the palace to the Aztec priests"], correctIndex: 1 },
            { id: 23, timestamp: 1845, text: "Who began organizing the Aztec counter-attack against the Spanish while Moctezuma was imprisoned?", options: ["Moctezuma's brother, Cuitlahuac", "The translator, Marina", "The High Priest of the Sun", "A rival Tlaxcalan chief"], correctIndex: 0 },
            { id: 24, timestamp: 1982, text: "How was Moctezuma fatally wounded?", options: ["Cortés executed him privately in his cell", "He was struck by stones and arrows thrown by his own people while trying to speak to them", "He died of a sudden illness that swept the palace", "He fell off the palace roof by accident"], correctIndex: 1 },
            { id: 25, timestamp: 2080, text: "What is the historical name for the night the Spanish suffered massive casualties trying to flee Tenochtitlan?", options: ["The Night of Fire", "La Noche Triste (The Sad Night)", "The Great Escape", "The Aztec Vengeance"], correctIndex: 1 },
            { id: 26, timestamp: 2185, text: "According to historians, who actually made up the vast majority of the military forces that conquered the Aztec Empire?", options: ["Portuguese mercenaries", "Other Mesoamerican native groups (like the Tlaxcalans) allied with the Spanish", "French and Italian auxiliary troops", "Reinforcements sent from Cuba"], correctIndex: 1 },
            { id: 27, timestamp: 2305, text: "What invisible 'ally' severely decimated the native population and weakened the Aztec Empire?", options: ["The Bubonic Plague", "Smallpox", "Malaria", "Cholera"], correctIndex: 1 },
            { id: 28, timestamp: 2490, text: "What critical resource did Cortés cut off during his final siege of the island city?", options: ["The gold mines", "The fresh water supply (aqueducts)", "The salt trade routes", "The timber shipments"], correctIndex: 1 },
            { id: 29, timestamp: 2565, text: "What naval vessels did Cortés construct to dominate Lake Texcoco and destroy native canoes?", options: ["Large ocean galleons", "Submarines", "Small sailing ships called brigantines", "Heavily armored rafts"], correctIndex: 2 },
            { id: 30, timestamp: 2675, text: "What was the physical fate of Tenochtitlan after the Spanish victory?", options: ["It was preserved exactly as it was as a museum", "Cortés systematically destroyed it block by block during the brutal siege", "It sank entirely into the lake", "It was left completely untouched by the fighting"], correctIndex: 1 }
        ];

        const App = () => {
            const [player, setPlayer] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [ccEnabled, setCcEnabled] = useState(false);
            
            const [maxTimeWatched, setMaxTimeWatched] = useState(0);
            const maxTimeWatchedRef = useRef(0);
            const lastSeekTimeRef = useRef(0);
            
            const [activeQuestion, setActiveQuestion] = useState(null);
            const activeQuestionRef = useRef(null);
            activeQuestionRef.current = activeQuestion;

            const [answeredQuestions, setAnsweredQuestions] = useState(new Set());
            const answeredQuestionsRef = useRef(new Set());
            answeredQuestionsRef.current = answeredQuestions;

            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);

            const playerContainerRef = useRef(null);
            const intervalRef = useRef(null);

            // 1. Load YouTube Iframe API
            useEffect(() => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    
                    window.onYouTubeIframeAPIReady = initializePlayer;
                } else {
                    initializePlayer();
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, []);

            const initializePlayer = () => {
                const newPlayer = new window.YT.Player(playerContainerRef.current, {
                    videoId: 'ncs5bztPFZY',
                    playerVars: {
                        controls: 0,       // Hide default controls
                        disablekb: 1,      // Disable keyboard shortcuts
                        rel: 0,            // Don't show related videos
                        modestbranding: 1, // Hide YouTube logo
                        fs: 0,             // Disable fullscreen button
                        iv_load_policy: 3, // Hide annotations
                        start: 0,          // Force start at 0 
                        cc_load_policy: 1  // Load CC module (crucial for custom toggling)
                    },
                    events: {
                        onReady: (event) => {
                            setPlayer(event.target);
                            setDuration(event.target.getDuration());
                            // Start with captions off by default despite loading module
                            event.target.setOption('captions', 'track', {}); 
                        },
                        onStateChange: (event) => {
                            setIsPlaying(event.data === window.YT.PlayerState.PLAYING);
                            if (event.data === window.YT.PlayerState.PLAYING) {
                                // Enforce 1x speed 
                                if (event.target.getPlaybackRate() !== 1) {
                                    event.target.setPlaybackRate(1);
                                }
                            }
                        }
                    }
                });
            };

            // 2. Main Video Loop (Time tracking, Anti-cheat, Question triggers)
            useEffect(() => {
                if (isPlaying && player) {
                    intervalRef.current = setInterval(() => {
                        const time = player.getCurrentTime();
                        
                        // Prevent anti-cheat loop fighting asynchronous YouTube seeks or explicit rewinds
                        if (Date.now() - lastSeekTimeRef.current < 1500) {
                            setCurrentTime(time);
                            return;
                        }
                        
                        let currentMax = maxTimeWatchedRef.current;

                        // Prevent fast forwarding natively or via hacks
                        if (time > currentMax + 2) { 
                            player.seekTo(currentMax, true);
                            lastSeekTimeRef.current = Date.now();
                            return;
                        } else {
                            const newMax = Math.max(currentMax, time);
                            maxTimeWatchedRef.current = newMax;
                            setMaxTimeWatched(newMax);
                        }

                        setCurrentTime(time);

                        // Check for questions
                        if (!activeQuestionRef.current) {
                            const upcoming = QUIZ_QUESTIONS.find(q => 
                                time >= q.timestamp && 
                                time < q.timestamp + 1 && // 1 second trigger window
                                !answeredQuestionsRef.current.has(q.id)
                            );
                            
                            if (upcoming) {
                                player.pauseVideo();
                                setActiveQuestion(upcoming);
                            }
                        }
                    }, 250);
                } else {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [isPlaying, player]);

            // 3. Custom Player Controls
            const togglePlayPause = () => {
                if (!player) return;
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            };

            const toggleCC = () => {
                if (!player) return;
                if (ccEnabled) {
                    player.setOption('captions', 'track', {}); // Disable CC
                    setCcEnabled(false);
                } else {
                    player.setOption('captions', 'track', {languageCode: 'en'}); // Enable English CC
                    setCcEnabled(true);
                }
            };

            const handleRewind = () => {
                if (!player) return;
                const newTime = Math.max(0, player.getCurrentTime() - 10);
                lastSeekTimeRef.current = Date.now(); // Pause anti-cheat so jump works smoothly
                player.seekTo(newTime, true);
                setCurrentTime(newTime);
            };

            const handleTimelineClick = (e) => {
                if (!player) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const clickRatio = (e.clientX - rect.left) / rect.width;
                let targetTime = clickRatio * duration;

                // Anti-fast-forward restriction (students CAN click backwards)
                if (targetTime > maxTimeWatchedRef.current) {
                    targetTime = maxTimeWatchedRef.current; // Snap to maximum watched time
                }
                
                lastSeekTimeRef.current = Date.now(); // Prevent anti-cheat from fighting this seek
                player.seekTo(targetTime, true);
                setCurrentTime(targetTime);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = Math.floor(seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // 4. Quiz Handlers
            const handleOptionClick = (index) => {
                if (showFeedback) return; // Prevent changing answer
                setSelectedOption(index);
                setShowFeedback(true);
            };

            const handleContinue = () => {
                setAnsweredQuestions(prev => new Set(prev).add(activeQuestion.id));
                setActiveQuestion(null);
                setSelectedOption(null);
                setShowFeedback(false);
                lastSeekTimeRef.current = Date.now(); // Prevent stutter immediately after unpausing
                player.playVideo();
            };

            // Fix for GitHub Pages: Extract inline styles to prevent Jekyll from breaking on {{ and }} tags
            const maxWatchedStyle = { width: `${(maxTimeWatched / duration) * 100 || 0}%` };
            const currentTimeStyle = { width: `${(currentTime / duration) * 100 || 0}%` };

            return (
                <div className="w-full flex flex-col items-center gap-6">
                    <div className="text-center space-y-2">
                        <h1 className="text-3xl font-bold text-white">Interactive History: The Aztec Empire</h1>
                        <p className="text-slate-400">Watch the video. It will automatically pause for questions. <span className="text-amber-400">Fast-forwarding is disabled.</span></p>
                    </div>

                    <div className="relative w-full aspect-video bg-black rounded-xl shadow-2xl overflow-hidden border border-slate-700">
                        {/* The pointer-events-none class is CRUCIAL here. 
                            It prevents users from clicking the YouTube iframe directly,
                            disabling native pausing, native keyboard shortcuts, and native seeking.
                        */}
                        <div className="absolute inset-0 pointer-events-none">
                            <div ref={playerContainerRef} className="w-full h-full"></div>
                        </div>

                        {/* Custom Question Overlay */}
                        {activeQuestion && (
                            <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-8">
                                <div className="max-w-2xl w-full bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-600">
                                    <h2 className="text-2xl font-bold mb-6 text-white leading-relaxed">
                                        {activeQuestion.text}
                                    </h2>
                                    
                                    <div className="space-y-3">
                                        {activeQuestion.options.map((option, idx) => {
                                            let btnStyles = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 font-medium ";
                                            
                                            if (!showFeedback) {
                                                btnStyles += "border-slate-600 hover:border-blue-400 hover:bg-slate-700 bg-slate-700/50 text-slate-200";
                                            } else {
                                                if (idx === activeQuestion.correctIndex) {
                                                    btnStyles += "border-green-500 bg-green-500/20 text-green-100"; // Correct answer is always highlighted
                                                } else if (idx === selectedOption) {
                                                    btnStyles += "border-red-500 bg-red-500/20 text-red-100"; // Incorrect selection
                                                } else {
                                                    btnStyles += "border-slate-700 bg-slate-800 text-slate-500 opacity-50"; // Unselected wrong answers
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleOptionClick(idx)}
                                                    className={btnStyles}
                                                    disabled={showFeedback}
                                                >
                                                    <span className="inline-block w-8 font-bold opacity-70">
                                                        {String.fromCharCode(65 + idx)}.
                                                    </span>
                                                    {option}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {showFeedback && (
                                        <div className="mt-8 flex justify-between items-center animate-fadeIn">
                                            <div className={`text-lg font-bold ${selectedOption === activeQuestion.correctIndex ? 'text-green-400' : 'text-red-400'}`}>
                                                {selectedOption === activeQuestion.correctIndex ? '✓ Correct!' : '✗ Incorrect.'}
                                            </div>
                                            <button 
                                                onClick={handleContinue}
                                                className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg font-bold shadow-lg transition-colors"
                                            >
                                                Continue Video
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Custom Control Bar */}
                        <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent p-4 flex flex-col gap-2 z-40">
                            {/* Timeline */}
                            <div 
                                className="relative w-full h-3 bg-slate-700 rounded-full cursor-pointer group"
                                onClick={handleTimelineClick}
                            >
                                {/* Max Watched Buffer */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-slate-500 rounded-full opacity-50 transition-all duration-200"
                                    style={maxWatchedStyle}
                                ></div>
                                
                                {/* Current Time Progress */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-blue-500 rounded-full transition-all duration-200"
                                    style={currentTimeStyle}
                                ></div>

                                {/* Question Markers */}
                                {duration > 0 && QUIZ_QUESTIONS.map(q => {
                                    const markerStyle = { left: `calc(${(q.timestamp / duration) * 100}% - 4px)` };
                                    return (
                                        <div 
                                            key={q.id}
                                            className={`absolute top-1/2 -translate-y-1/2 w-2.5 h-2.5 rounded-full ${answeredQuestions.has(q.id) ? 'bg-green-400' : 'bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.8)]'}`}
                                            style={markerStyle}
                                            title="Question Marker"
                                        ></div>
                                    );
                                })}
                            </div>

                            {/* Controls row */}
                            <div className="flex items-center gap-5 mt-2">
                                <button 
                                    onClick={togglePlayPause}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none"
                                    disabled={!!activeQuestion}
                                    title={isPlaying ? "Pause" : "Play"}
                                >
                                    {isPlaying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                    )}
                                </button>
                                
                                <button 
                                    onClick={handleRewind}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none flex items-center gap-1"
                                    disabled={!!activeQuestion}
                                    title="Rewind 10 Seconds"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    <span className="text-xs font-bold -ml-0.5">10s</span>
                                </button>
                                
                                <button 
                                    onClick={toggleCC}
                                    className={`transition-colors focus:outline-none ${ccEnabled ? 'text-blue-400' : 'text-slate-400 hover:text-white'}`}
                                    title={ccEnabled ? "Turn Off Captions" : "Turn On Captions"}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="14" x="3" y="5" rx="2" ry="2"/><path d="M7 15h4M15 15h2M7 11h2M13 11h4"/></svg>
                                </button>

                                <div className="text-sm font-medium text-slate-300 font-mono">
                                    {formatTime(currentTime)} / {formatTime(duration)}
                                </div>
                                
                                <div className="ml-auto flex items-center gap-4 text-xs font-semibold text-slate-400">
                                    <span className="flex items-center gap-1">
                                        <span className="w-2 h-2 rounded-full bg-amber-400"></span> Unanswered
                                    </span>
                                    <span className="flex items-center gap-1">
                                        <span className="w-2 h-2 rounded-full bg-green-400"></span> Answered
                                    </span>
                                    <span>
                                        Score: {answeredQuestions.size} / 30
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
